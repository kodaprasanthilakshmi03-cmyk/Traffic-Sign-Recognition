<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prediction History</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      background-color: #2c2c2d;
      font-family: 'Segoe UI', sans-serif;
    }
    .container {
      margin-top: 40px;
    }
    .thumbnail {
      height: 60px;
      object-fit: cover;
      border-radius: 5px;
    }
    .search-bar {
      max-width: 400px;
      margin-bottom: 20px;
    }
    .btn-clear {
      float: right;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="mb-4 text-center text-white">🧠 Prediction History</h2>
    <form class="d-flex mb-3 search-bar" method="GET">
      <input class="form-control me-2" type="search" placeholder="Search by class or date..." name="q" value="{{ query }}">
      <button class="btn btn-outline-primary" type="submit" >Search</button>
      <a href="{{ url_for('history') }}" class="btn btn-secondary ms-2">Reset</a>
    </form>
    <form method="POST" action="{{ url_for('clear_history') }}">
      <button class="btn btn-danger btn-sm mb-3 btn-clear" onclick="return confirm('Are you sure you want to clear the entire history?')">🧹 Clear History</button>
    </form>

    {% if predictions %}
      <table class="table table-bordered table-hover">
        <thead class="table-primary text-center">
          <tr>
            <th>🖼️ Image</th>
            <th>🧠 Predicted Class</th>
            <th>🕒 Timestamp</th>
            <th>❌ Action</th>
          </tr>
        </thead>
        <tbody>
          {% for item in predictions %}
          <tr class="align-middle text-center">
            <td><img src="{{ url_for('static', filename=item.image_path) }}" class="thumbnail"></td>
            <td>{{ item.predicted_class }}</td>
            <td>{{ item.timestamp }}</td>
            <td>
              <form method="POST" action="{{ url_for('delete_row') }}">
                <input type="hidden" name="index" value="{{ loop.index0 }}">
                <button type="submit" class="btn btn-outline-danger btn-sm" onclick="return confirm('Delete this entry?')">Delete</button>
              </form>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    {% else %}
      <div class="alert alert-warning text-center">No prediction history available.</div>
    {% endif %}
  <a href="/" style="display:inline-block; text-align:center; background-color:#ffc107; color:#000; padding:10px 20px; text-decoration:none; border-radius:8px; font-weight:500;">🏠 Back to Home</a>
  </div>
</body>
</html>
